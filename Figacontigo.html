<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FIGA">
<meta name="theme-color" content="#0B1121">
<title>FIGA Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0B1121;--bg2:#111827;--bg3:#1F2937;--bg4:#374151;
--pri:#2E7BF6;--pri-l:#60A5FA;--pri-d:#1D4FD7;--pri-bg:rgba(46,123,246,0.15);
--text:#F9FAFB;--text2:#D1D5DB;--text3:#9CA3AF;--text4:#6B7280;
--green:#10B981;--green-bg:rgba(16,185,129,0.15);
--yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.15);
--red:#EF4444;--red-bg:rgba(239,68,68,0.15);
--purple:#8B5CF6;--purple-bg:rgba(139,92,246,0.15);
--orange:#F97316;--orange-bg:rgba(249,115,22,0.15);
--border:#1F2937;--border2:#374151;
--r:12px;--sh:0 2px 8px rgba(0,0,0,0.3);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
input,select,textarea,button{font-family:'Inter',sans-serif}

.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 30%,rgba(46,123,246,0.08),transparent 70%)}
.login-logo{width:220px;margin-bottom:40px;filter:drop-shadow(0 4px 20px rgba(46,123,246,0.2))}
.login-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:32px 28px;width:260px;text-align:center;cursor:pointer;transition:all .3s}
.login-card:hover{border-color:var(--pri);transform:translateY(-4px);box-shadow:0 8px 30px rgba(46,123,246,0.15)}
.login-card .icon{font-size:40px;margin-bottom:12px}
.login-card h3{font-size:18px;font-weight:700;margin-bottom:6px}
.login-card p{font-size:13px;color:var(--text3)}
.login-pin{margin-top:24px;text-align:center;display:none}
.login-pin.show{display:block}
.login-pin input{background:var(--bg3);border:2px solid var(--border2);color:var(--text);padding:12px 16px;border-radius:10px;font-size:16px;width:200px;text-align:center;letter-spacing:8px;outline:0}
.login-pin input:focus{border-color:var(--pri)}
.login-pin button{margin-top:12px;display:block;margin-left:auto;margin-right:auto}

.app-layout{display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;gap:4px;position:fixed;left:0;top:0;z-index:100;overflow-y:auto}
.sidebar-logo{width:140px;margin:0 auto 20px;display:block}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:0;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);background:0;transition:all .2s;width:100%;text-align:left}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{background:var(--pri-bg);color:var(--pri-l)}
.nav-item .ni{font-size:16px;width:22px;text-align:center}
.nav-alert{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:auto}
.nav-sep{height:1px;background:var(--border);margin:12px 8px}
.sidebar-footer{margin-top:auto;font-size:10px;color:var(--text4);text-align:center;padding:12px 0}

.main{flex:1;margin-left:240px;padding:28px 32px;min-height:100vh}

.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:100;justify-content:space-around}
.mobile-nav button{background:0;border:0;color:var(--text4);font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;border-radius:8px;position:relative;font-family:'Inter',sans-serif}
.mobile-nav button.active{color:var(--pri-l)}
.mobile-nav button .mn{font-size:18px}
.mobile-nav .m-dot{position:absolute;top:2px;right:6px;width:7px;height:7px;background:var(--red);border-radius:50%}

/* WIZARD */
.wizard{max-width:640px;margin:0 auto;padding:20px 0}
.wizard-header{text-align:center;margin-bottom:32px}
.wizard-logo{width:160px;margin-bottom:16px}
.wizard-steps{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.wizard-step{width:40px;height:4px;border-radius:2px;background:var(--bg4);transition:all .3s}
.wizard-step.done{background:var(--green)}
.wizard-step.current{background:var(--pri);width:60px}
.wizard-title{font-size:22px;font-weight:700;margin-bottom:6px}
.wizard-sub{color:var(--text3);font-size:14px}
.wizard-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px}
.wizard-notice{background:var(--yellow-bg);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(--yellow);display:flex;align-items:flex-start;gap:10px}
.wizard-notice .wni{font-size:18px;flex-shrink:0}
.wizard-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}
.wizard-success{text-align:center;padding:60px 20px}
.wizard-success .icon{font-size:60px;margin-bottom:16px}

.page-title{font-size:24px;font-weight:800;color:var(--text)}
.page-sub{color:var(--text3);font-size:13px;margin:4px 0 20px}
.section-title{font-size:14px;font-weight:600;color:var(--text2);margin:20px 0 10px;display:flex;align-items:center;gap:8px}

.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.fg .req{color:var(--red)}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;font-size:13px;outline:0;transition:border .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pri)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--text4)}
.fg textarea{min-height:70px;resize:vertical}
.fg select option{background:var(--bg3);color:var(--text)}
.fg-row{display:flex;gap:12px}
.fg-row .fg{flex:1}
.fg .check-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.fg .check-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--pri)}
.fg .check-row label{font-size:13px;margin:0;color:var(--text2)}

.btn{padding:10px 20px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;border:0;transition:all .2s;white-space:nowrap}
.btn-p{background:var(--pri);color:#fff}.btn-p:hover{background:var(--pri-d)}.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-s{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}.btn-s:hover{border-color:var(--pri);color:var(--text)}
.btn-d{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn-back{background:0;border:0;color:var(--pri-l);font-weight:600;font-size:13px;cursor:pointer;padding:0 0 16px}
.btn-del{background:0;border:0;cursor:pointer;font-size:13px;opacity:.4;transition:opacity .2s}.btn-del:hover{opacity:1}

.top-bar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:12px}
.stat-card .icon{font-size:22px}
.stat-val{font-size:20px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}

.alert-banner{background:var(--red-bg);border:1px solid rgba(239,68,68,0.2);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.alert-banner .icon{font-size:22px}
.alert-banner .count{font-weight:700;font-size:18px;color:var(--red)}
.alert-banner .text{font-size:13px;color:var(--red)}
.alert-banner.warn{background:var(--yellow-bg);border-color:rgba(245,158,11,0.2)}
.alert-banner.warn .count{color:var(--yellow)}
.alert-banner.warn .text{color:var(--yellow)}

.search-input{width:100%;padding:10px 16px;background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:10px;font-size:13px;outline:0;margin-bottom:14px}
.search-input:focus{border-color:var(--pri)}.search-input::placeholder{color:var(--text4)}

.client-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.client-card:hover{border-color:var(--pri);background:rgba(46,123,246,0.04)}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--pri-d),var(--pri-l));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.avatar.lg{width:50px;height:50px;font-size:20px}
.c-name{font-weight:600;font-size:14px}
.c-info{font-size:12px;color:var(--text3);margin-top:2px}
.c-source{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--purple-bg);color:var(--purple);margin-left:6px}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-overdue{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab{padding:10px 16px;border:0;background:0;cursor:pointer;font-size:12px;font-weight:600;color:var(--text4);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;font-family:'Inter',sans-serif}
.tab.active{color:var(--pri-l);border-bottom-color:var(--pri)}

.cred-group{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.cred-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.cred-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.cred-item{flex:1;min-width:160px}
.cred-label{font-size:11px;color:var(--text4);margin-bottom:3px}
.cred-value{font-size:13px;font-weight:500;padding:7px 10px;background:var(--bg3);border-radius:6px;display:flex;align-items:center;justify-content:space-between;word-break:break-all;color:var(--text)}
.cred-value .toggle{cursor:pointer;font-size:12px;color:var(--text4);flex-shrink:0;margin-left:8px}

.table-wrap{overflow-x:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:hover td{background:rgba(255,255,255,0.02)}
tr.overdue td{background:var(--red-bg)}
.status-sel{background:var(--bg3);border:1px solid var(--border2);color:var(--text);cursor:pointer;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:600;font-family:'Inter',sans-serif}

.bureau-tabs{display:flex;gap:0;margin-bottom:14px}
.bureau-tab{padding:8px 16px;border:0;border-radius:8px 8px 0 0;cursor:pointer;font-size:12px;font-weight:600;background:var(--bg3);color:var(--text4);transition:all .2s;font-family:'Inter',sans-serif}
.bureau-tab.active-eq{background:#DC2626;color:#fff}
.bureau-tab.active-ex{background:#2563EB;color:#fff}
.bureau-tab.active-tu{background:#059669;color:#fff}

.acct-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;border-left:3px solid var(--border2)}
.acct-card.eliminated{border-left-color:var(--green);opacity:.65}
.acct-card.in_dispute{border-left-color:var(--yellow)}
.acct-card.active{border-left-color:var(--red)}

.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;border-left:3px solid var(--pri)}

.voice-btn{width:52px;height:52px;border-radius:50%;background:var(--pri);color:#fff;border:0;font-size:22px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle}
.voice-btn:hover{background:var(--pri-d)}
.voice-btn.recording{background:var(--red);animation:voicePulse 1s infinite}
@keyframes voicePulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 14px rgba(239,68,68,0)}}

.floating-mic{position:fixed;bottom:100px;right:24px;z-index:90;display:flex;flex-direction:column;align-items:center;gap:6px}
.floating-mic .voice-btn{width:70px;height:70px;font-size:30px;box-shadow:0 4px 24px rgba(46,123,246,0.5)}
.floating-mic .mic-label{font-size:11px;font-weight:600;color:var(--text);background:var(--bg2);padding:4px 10px;border-radius:6px;border:1px solid var(--border2);white-space:nowrap}

.quick-notes{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:20px}
.quick-notes-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.quick-note-input{display:flex;gap:8px;margin-bottom:14px}
.quick-note-input textarea{flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:8px;font-size:13px;outline:0;min-height:50px;resize:none;font-family:'Inter',sans-serif}
.quick-note-input textarea::placeholder{color:var(--text4)}
.quick-note-input textarea:focus{border-color:var(--pri)}
.quick-note-input button{align-self:flex-end}

.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}
.upload-zone:hover{border-color:var(--pri);background:var(--pri-bg)}
.upload-zone .uzi{font-size:28px}
.upload-zone p{color:var(--text3);font-size:12px;margin-top:6px}
.upload-zone.has-file{border-color:var(--green);border-style:solid;background:var(--green-bg)}
.upload-zone.has-file p{color:var(--green)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;padding:24px}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-t{font-size:17px;font-weight:700}
.close-btn{background:var(--bg4);border:0;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text)}

.empty{text-align:center;padding:40px 20px;color:var(--text4)}
.empty .icon{font-size:36px;display:block;margin-bottom:8px}

.toast{position:fixed;bottom:80px;right:20px;background:var(--pri);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:2000;box-shadow:0 8px 24px rgba(46,123,246,.3);animation:slideIn .3s ease;display:none}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.referral-link{display:inline-flex;align-items:center;gap:6px;background:var(--pri-bg);color:var(--pri-l);padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;border:1px solid rgba(46,123,246,0.2)}
.referral-link:hover{background:var(--pri);color:#fff}

.source-filter{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.source-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--text3);border:1px solid var(--border2);transition:all .2s}
.source-chip.active{background:var(--pri-bg);color:var(--pri-l);border-color:var(--pri)}

.doc-preview{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border2)}

@media(max-width:768px){
.sidebar{display:none}.mobile-nav{display:flex}
.main{margin-left:0;padding:16px 14px 100px}
.page-title{font-size:20px}.stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
.modal{max-width:100%;margin:8px;padding:18px}
.fg-row{flex-direction:column;gap:0}.cred-row{flex-direction:column;gap:4px}
.toast{bottom:90px;right:14px;left:14px;text-align:center}
.login-logo{width:160px}.login-card{width:100%;max-width:280px;padding:24px}
th,td{padding:8px 10px;font-size:12px}
}
</style>
</head>

const SK="figa_v3";
function getPIN(){try{return localStorage.getItem("figa_pin")||"1234"}catch(e){return"1234"}}
function setPIN(p){try{localStorage.setItem("figa_pin",p)}catch(e){}}
function changePin(){
  const current=prompt("PIN actual:");
  if(current!==getPIN())return toast("PIN incorrecto");
  const newPin=prompt("Nuevo PIN (4 dígitos):");
  if(!newPin||newPin.length<4)return toast("PIN inválido");
  setPIN(newPin);toast("PIN cambiado exitosamente");
}

function daysUntil(d){
  if(!d.sentDate||d.status==="resuelta"||d.status==="rechazada")return null;
  const days=d.type==="metro2"?16:30;
  const next=new Date(d.sentDate);next.setDate(next.getDate()+days);
  return Math.ceil((next-new Date())/(864e5));
}

let recognition=null;let isRecording=false;let voiceClientId=null;
function toggleVoice(clientId){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){toast("Tu navegador no soporta dictado por voz");return}
  if(isRecording){recognition.stop();return}
  voiceClientId=clientId;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='es-US';recognition.continuous=true;recognition.interimResults=true;
  let finalText="";
  recognition.onresult=e=>{
    let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)finalText+=e.results[i][0].transcript+" ";
      else interim+=e.results[i][0].transcript;
    }
    const el=document.getElementById("voiceOutput");
    if(el)el.textContent=finalText+interim;
  };
  recognition.onend=()=>{
    isRecording=false;
    if(finalText.trim()){
      S.data.notes.push({id:gid(),clientId:voiceClientId,title:"🎙 Nota de Voz",text:finalText.trim(),createdAt:new Date().toISOString()});
      save();toast("Nota de voz guardada");
    }
    render();
  };
  recognition.onerror=()=>{isRecording=false;render()};
  recognition.start();isRecording=true;render();
}

// DISPUTE LETTER UPLOAD + AI CODE DETECTION
function uploadDisputeLetter(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*,.pdf';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      // Compress if image
      const base64Full=ev.target.result;
      S.form.letterFile=base64Full;
      S.form.letterFileName=file.name;
      render();
      // Try to detect e-OSCAR code via AI
      try{
        const b64=base64Full.split(",")[1];
        const mediaType=file.type.includes("pdf")?"application/pdf":file.type||"image/jpeg";
        const contentBlock=file.type.includes("pdf")?
          {type:"document",source:{type:"base64",media_type:mediaType,data:b64}}:
          {type:"image",source:{type:"base64",media_type:mediaType,data:b64}};
        if(!getApiKey()){toast("Configura tu API Key para detección automática");S.aiProcessing=false;render();return;}
        toast("Analizando carta para detectar código e-OSCAR...");
        const resp=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,
            messages:[{role:"user",content:[contentBlock,
              {type:"text",text:`This is a credit dispute letter. Identify the e-OSCAR reason code used. Valid codes: 001,002,006,008,010,012,014,019,023,024,031,037,038,039,040,041,100,101,102,103,104,105,106,107,108,109,110,111,112. Respond ONLY with JSON: {"code":"XXX"} or {"code":"none"} if not found.`}]}]})
        });
        const data=await resp.json();
        const text=data.content?.map(c=>c.text||"").join("")||"";
        const clean=text.replace(/```json|```/g,"").trim();
        const parsed=JSON.parse(clean);
        if(parsed.code&&parsed.code!=="none"){
          S.form.oscarCode=parsed.code;
          toast("Código e-OSCAR detectado: "+parsed.code);
          render();
        }else{toast("No se detectó código. Selecciónalo manualmente.")}
      }catch(err){console.error(err);toast("No se pudo analizar. Selecciona el código manualmente.")}
    };
    reader.readAsDataURL(file);
  };inp.click();
}

async function processAIReport(file,clientId,bureau){
  if(!getApiKey()){toast("⚠ Configura tu API Key primero (menú → 🔑 API Key)");return;}
  S.aiProcessing=true;render();
  try{
    const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej();r.readAsDataURL(file)});
    const mediaType=file.type.includes("pdf")?"application/pdf":file.type||"image/jpeg";
    const contentBlock=file.type.includes("pdf")?
      {type:"document",source:{type:"base64",media_type:mediaType,data:base64}}:
      {type:"image",source:{type:"base64",media_type:mediaType,data:base64}};
    const bureauInstructions=bureau==='ALL'?
      'Extract for ALL THREE bureaus (TransUnion, Experian, Equifax). Return a separate entry for each bureau where the account appears.':
      `Extract ONLY for bureau: ${bureau}.`;
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,
        messages:[{role:"user",content:[contentBlock,
          {type:"text",text:`Analyze this credit analysis report. ${bureauInstructions}

Extract ALL negative accounts to dispute, inquiries to dispute, and personal information to dispute.

For each negative account: creditor name, account number (as shown), type (Late Payment, Charge-off, Collection, Settled), balance, and the bureau (equifax, experian, or transunion).
For inquiries: creditor name, date, and bureau.
For personal info: item description, details, and bureau.

IMPORTANT: Create SEPARATE entries for EACH BUREAU where an account appears. For example if FST PREMIER appears in TU, EX, and EQ, create 3 entries.

Respond ONLY with valid JSON, no markdown, no backticks:
{"items":[{"bureau":"equifax|experian|transunion","type":"Charge-off|Collection|Late Payment|Settled|Inquiry|Info Personal","creditor_name":"...","account_number":"...","balance":"...","date":"...","notes":"..."}]}
If you cannot read clearly, return empty items. JSON only.`}]}]})
    });
    const data=await resp.json();
    const text=data.content?.map(c=>c.text||"").join("")||"";
    const clean=text.replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(clean);
    let count=0;
    if(parsed.items){
      parsed.items.forEach(a=>{
        const acctType=a.type||"Otro";
        S.data.accounts.push({id:gid(),clientId,
          bureau:a.bureau||bureau,
          acctType,
          creditorName:a.creditor_name||"",
          accountNumber:a.account_number||"",
          balance:a.balance||"",
          date:a.date||"",
          notes:a.notes||"",
          bureaus:a.bureau||bureau,
          status:"active",
          createdAt:new Date().toISOString()
        });
        count++;
      });
    }
    save();toast(count+" elementos extraídos"+(bureau==='ALL'?" de los 3 burós":" de "+bureau));
  }catch(err){console.error(err);toast("Error al procesar. Intenta con otra imagen/PDF.")}
  S.aiProcessing=false;render();
}

function handleWizardFile(field,useCamera){
  const inp=document.createElement('input');inp.type='file';
  if(useCamera){inp.accept='image/*';inp.setAttribute('capture','environment')}
  else{inp.accept='image/*,.pdf'}
  inp.onchange=e=>{const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();reader.onload=ev=>{
      if(!S.wizardData.docs)S.wizardData.docs={};
      if(file.type.indexOf('pdf')>=0){S.wizardData.docs[field]={name:file.name,data:ev.target.result,isPdf:true};render();return}
      const img=new Image();img.onload=()=>{
        const canvas=document.createElement('canvas');const MAX=600;let w=img.width,h=img.height;
        if(w>MAX){h=h*(MAX/w);w=MAX}if(h>MAX){w=w*(MAX/h);h=MAX}
        canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
        S.wizardData.docs[field]={name:file.name,data:canvas.toDataURL('image/jpeg',0.7)};render();
      };img.src=ev.target.result;
    };reader.readAsDataURL(file);
  };inp.click();
}

function getApiKey(){try{return localStorage.getItem("figa_api_key")||""}catch(e){return""}}
function setApiKey(k){try{localStorage.setItem("figa_api_key",k)}catch(e){}}
function promptApiKey(){

  const key=prompt("Pega tu API Key de Anthropic (console.anthropic.com):\n\nActual: "+(current?current.substring(0,12)+"...":"No configurada"));

// BACKUP FUNCTIONS  
function exportBackup(){
  const data=JSON.stringify(S.data,null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="FIGA_Backup_"+new Date().toISOString().split("T")[0]+".json";
  a.click();URL.revokeObjectURL(url);
  toast("Backup descargado");
}
function importBackup(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imported=JSON.parse(ev.target.result);
        if(imported.clients){
          if(confirm("Esto reemplazará TODOS tus datos actuales con el backup. ¿Continuar?")){
            S.data=imported;save();toast("Backup restaurado: "+imported.clients.length+" clientes");render();
          }
        }else{toast("Archivo no válido")}
      }catch(err){toast("Error leyendo archivo")}
    };reader.readAsText(file);
  };inp.click();
}

    ${["Equifax","Experian","TransUnion"].map(b=>{const k=b.toLowerCase();return`<p style="font-size:11px;color:var(--text4);margin:6px 0 2px">${b}</p>
    <div class="fg-row"><div class="fg"><label>Usuario</label><input value="${esc(f[k+"User"]||"")}" oninput="setF('${k}User',this.value)"></div>
    <div class="fg"><label>Contraseña</label><input value="${esc(f[k+"Pass"]||"")}" oninput="setF('${k}Pass',this.value)"></div></div>`}).join("")}
    <h4 style="font-size:12px;color:var(--text3);margin:12px 0 6px">Monitor</h4>
    <div class="fg"><select onchange="setF('monitorType',this.value)"><option value="">Seleccionar...</option>${MONITORS.map(m=>`<option value="${m}" ${f.monitorType===m?"selected":""}>${m}</option>`).join("")}</select></div>
    <div class="fg-row"><div class="fg"><label>Usuario</label><input value="${esc(f.monitorUser||"")}" oninput="setF('monitorUser',this.value)"></div>
    <div class="fg"><label>Contraseña</label><input value="${esc(f.monitorPass||"")}" oninput="setF('monitorPass',this.value)"></div></div>`;
    action=`<button class="btn btn-p" style="width:100%;margin-top:12px" onclick="updateClient()">Guardar</button>`;
  }
  else if(m==="editInternal"){
    title="Gestión Interna FIGA";
    fields=`<div class="fg-row"><div class="fg"><label>Email FIGA</label><input value="${esc(f.figaEmail||"")}" oninput="setF('figaEmail',this.value)"></div>
    <div class="fg"><label>Contraseña</label><input value="${esc(f.figaEmailPass||"")}" oninput="setF('figaEmailPass',this.value)"></div></div>
    <div class="fg"><div class="check-row"><input type="checkbox" id="pu" ${f.personalUpdate?"checked":""} onchange="setF('personalUpdate',this.checked)"><label for="pu">Actualización Datos completada</label></div></div>
    <div class="fg"><div class="check-row"><input type="checkbox" id="iq" ${f.inquiriesDisputed?"checked":""} onchange="setF('inquiriesDisputed',this.checked)"><label for="iq">Inquiries disputados</label></div></div>`;
    action=`<button class="btn btn-p" style="width:100%;margin-top:12px" onclick="updateClient()">Guardar</button>`;
  }
  else if(m==="addAccount"){
    title="Agregar Cuenta";
    fields=`<div class="fg"><label>Buró</label><select onchange="setF('bureau',this.value)">
      <option value="equifax" ${f.bureau==="equifax"?"selected":""}>Equifax</option><option value="experian" ${f.bureau==="experian"?"selected":""}>Experian</option><option value="transunion" ${f.bureau==="transunion"?"selected":""}>TransUnion</option></select></div>
    <div class="fg"><label>Tipo</label><select onchange="setF('acctType',this.value)"><option value="">Seleccionar...</option>${ACCT_TYPES.map(t=>`<option value="${t}" ${f.acctType===t?"selected":""}>${t}</option>`).join("")}</select></div>
    <div class="fg"><label>Acreedor <span class="req">*</span></label><input value="${esc(f.creditorName||"")}" oninput="setF('creditorName',this.value)"></div>
    <div class="fg-row"><div class="fg"><label>No. Cuenta</label><input value="${esc(f.accountNumber||"")}" oninput="setF('accountNumber',this.value)"></div>
    <div class="fg"><label>Balance</label><input value="${esc(f.balance||"")}" oninput="setF('balance',this.value)"></div></div>
    <div class="fg"><label>Notas</label><textarea oninput="setF('notes',this.value)">${esc(f.notes||"")}</textarea></div>`;
    action=`<button class="btn btn-p" style="width:100%;margin-top:12px" onclick="addAccount()">Agregar</button>`;
  }
  else if(m==="addDispute"){
    title="Nueva Disputa";
    fields=`${!f.clientId?`<div class="fg"><label>Cliente</label><select onchange="setF('clientId',this.value)"><option value="">Seleccionar...</option>${clientOpts}</select></div>`:""}
    <div class="fg-row"><div class="fg"><label>Tipo</label><select onchange="setF('type',this.value)">
      <option value="regular" ${f.type!=="metro2"?"selected":""}>Regular (30 días)</option>
      <option value="metro2" ${f.type==="metro2"?"selected":""}>Metro2/e-OSCAR (16 días)</option></select></div>
    <div class="fg"><label>Ronda</label><input type="number" value="${f.round||1}" oninput="setF('round',this.value)" min="1"></div></div>
    <div class="fg"><label>Destino</label><select onchange="setF('target',this.value)"><option value="">Seleccionar...</option>${DISPUTE_TARGETS.map(t=>`<option value="${t}" ${f.target===t?"selected":""}>${t}</option>`).join("")}</select></div>
    <div class="fg"><label>Acreedor / Cuenta</label><input value="${esc(f.creditorName||"")}" oninput="setF('creditorName',this.value)"></div>
    <div class="fg"><label>Método / Carta</label><select onchange="setF('method',this.value)"><option value="">Seleccionar...</option>${METHODS.map(m=>`<option value="${m}" ${f.method===m?"selected":""}>${m}</option>`).join("")}</select></div>
    <div class="fg"><label>Código e-OSCAR <span class="req">*</span></label><select onchange="setF('oscarCode',this.value)" style="font-size:12px"><option value="">⚠ Seleccionar código (obligatorio)...</option>${OSCAR_CODES.map(c=>`<option value="${c.code}" ${f.oscarCode===c.code?"selected":""}>${c.code} - ${c.desc}</option>`).join("")}</select>
    ${f.clientId?`<div style="margin-top:6px;font-size:11px;color:var(--text4)">Códigos ya usados en este cliente: ${(()=>{const used=S.data.disputes.filter(d=>d.clientId===f.clientId&&d.oscarCode).map(d=>d.oscarCode);return[...new Set(used)].join(", ")||"Ninguno"})()}</div>`:""}</div>
    <div class="fg"><label>📎 Carta de Disputa (PDF/Foto)</label>
      <div class="upload-zone ${f.letterFile?"has-file":""}" onclick="uploadDisputeLetter()" style="padding:14px">
        ${f.letterFile?`<p>✅ ${esc(f.letterFileName)} — Toca para cambiar</p>`:`<div class="uzi">📄</div><p>Subir carta de disputa (opcional)</p>`}
      </div></div>
    <div class="fg"><label>Fecha Envío</label><input type="date" value="${f.sentDate||new Date().toISOString().split('T')[0]}" oninput="setF('sentDate',this.value)"></div>
    <div class="fg"><label>Fecha Recibida por Buró</label><input type="date" value="${f.receivedDate||""}" oninput="setF('receivedDate',this.value)"></div>
    <div class="fg"><label>Guía / Tracking de Envío</label><input value="${esc(f.trackingNumber||"")}" oninput="setF('trackingNumber',this.value)" placeholder="No. de guía USPS, FedEx..."></div>
    <div class="fg"><div class="check-row"><input type="checkbox" id="cfpb" ${f.usedCFPB?"checked":""} onchange="setF('usedCFPB',this.checked)"><label for="cfpb">Se usó CFPB</label></div></div>
    <div class="fg"><div class="check-row"><input type="checkbox" id="ftc" ${f.reportedFTC?"checked":""} onchange="setF('reportedFTC',this.checked)"><label for="ftc">Se reportó al FTC</label></div></div>
    <div class="fg"><label>Notas</label><textarea oninput="setF('notes',this.value)">${esc(f.notes||"")}</textarea></div>`;
    action=`<button class="btn btn-p" style="width:100%;margin-top:12px" onclick="addDispute()">Registrar</button>`;
  }
  else if(m==="addNote"){
    title="Nueva Nota";
    fields=`<div class="fg"><label>Título</label><input value="${esc(f.title||"")}" oninput="setF('title',this.value)"></div>
    <div class="fg"><label>Nota <span class="req">*</span></label><textarea oninput="setF('text',this.value)">${esc(f.text||"")}</textarea></div>`;
    action=`<button class="btn btn-p" style="width:100%;margin-top:12px" onclick="addNote()">Guardar</button>`;
  }
  else if(m==="manageSources"){
    title="Gestionar Fuentes";
    fields=`<p style="font-size:13px;color:var(--text3);margin-bottom:14px">Empresas o personas que te refieren clientes</p>
    ${sources.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="flex:1;font-size:14px">${esc(s)}</span>
      ${s!=="FIGA Directo"?`<button class="btn-del" onclick="removeSource('${esc(s)}');closeModal()">🗑</button>`:""}</div>`).join("")}
    <button class="btn btn-s" style="width:100%;margin-top:14px" onclick="addSource()">＋ Agregar Fuente</button>`;
    action="";
  }
  if(!title)return;
  const ov=document.createElement("div");ov.className="overlay";
  ov.onclick=e=>{if(e.target===ov)closeModal()};
  ov.innerHTML=`<div class="modal"><div class="modal-h"><h3 class="modal-t">${title}</h3><button class="close-btn" onclick="closeModal()">✕</button></div>${fields}${action}</div>`;
  document.body.appendChild(ov);
}

load();render();
</script>
</body>
</html>
